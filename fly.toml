app = 'app-falling-moonbeam-4418'
primary_region = 'sin'

[build]

[env]
  PORT = "3003"
  NODE_ENV = "production"

[processes]
  app = "node server/index.js"

[http_service]
  internal_port = 3003
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 0
  processes = ['app']

[[vm]]
  memory = '1gb'
  cpu_kind = 'shared'
  cpus = 1
  memory_mb = 1024
